stages:
  - test
  - build
  - deploy

variables:
  IMAGE_NAME: recycle-project
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

test:
  stage: test
  tags:
    - recycle-runner
  before_script:
    - python3.11 -m pip install -r requirements.txt --break-system-packages
  script:
    - python3.11 -m pytest tests/ -v
  only:
    - main

build:
  stage: build
  tags:
    - recycle-runner
  before_script:
    - docker info
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker save $IMAGE_NAME:$IMAGE_TAG | gzip > /tmp/image.tar.gz
  only:
    - main

deploy:
  stage: deploy
  tags:
    - recycle-runner
  before_script:
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - ssh root@$DROPLET_IP "docker stop recycle-app || true && docker rm recycle-app || true && docker run -d --name recycle-app -p 8501:8501 -p 50051:50051 $IMAGE_NAME:$IMAGE_TAG"
  only:
    - main