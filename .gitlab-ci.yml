stages:
  - test
  - build
  - deploy

variables:
  IMAGE_NAME: recycle-project
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

test:
  stage: test
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
  script:
    - pytest tests/ -v
  only:
    - main

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker save $IMAGE_NAME:$IMAGE_TAG | gzip > /tmp/image.tar.gz
  only:
    - main

deploy:
  stage: deploy
  before_script:
    - which ssh-agent || apt-get install -y openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts
  script:
    - ssh root@$DROPLET_IP "docker stop recycle-app || true && docker rm recycle-app || true && docker run -d --name recycle-app -p 8501:8501 -p 50051:50051 $IMAGE_NAME:$IMAGE_TAG"
  only:
    - main