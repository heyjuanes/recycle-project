syntax = "proto3";

package recycling;

service RecyclingInference {
  rpc DetectObjects (DetectionRequest) returns (DetectionResponse);
}

message DetectionRequest {
  bytes image_data = 1;
}

message DetectedObject {
  string class_name = 1;
  float confidence = 2;
  float x1 = 3;
  float y1 = 4;
  float x2 = 5;
  float y2 = 6;
  string material = 7;
}

message DetectionResponse {
  repeated DetectedObject objects = 1;
  bool success = 2;
  string message = 3;
}